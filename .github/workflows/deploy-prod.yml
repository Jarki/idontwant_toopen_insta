name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy"
        required: false
        default: "prod"
        type: string
      compose_ref:
        description: "Git ref to curl Compose files from"
        required: false
        default: "main"
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy prod bot
    runs-on: [self-hosted, pi]

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare deployment directory
        run: |
          set -euo pipefail
          deploy_dir="${HOME}/deploy/ig-reel-downloader-prod"
          mkdir -p "${deploy_dir}/data" "${deploy_dir}/output" "${deploy_dir}/assets"

          if [ ! -f "${deploy_dir}/.env" ]; then
            echo "::error file=${deploy_dir}/.env::Create runner-local .env before deploying."
            exit 1
          fi

      - name: Fetch Compose files
        env:
          COMPOSE_REF: ${{ inputs.compose_ref }}
        run: |
          set -euo pipefail
          deploy_dir="${HOME}/deploy/ig-reel-downloader-prod"
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${COMPOSE_REF}"

          curl -fsSL "${raw_base}/docker-compose.yaml" \
            -o "${deploy_dir}/docker-compose.yaml"
          curl -fsSL "${raw_base}/docker-compose.prod.override.yaml" \
            -o "${deploy_dir}/docker-compose.prod.override.yaml"

      - name: Pull image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          deploy_dir="${HOME}/deploy/ig-reel-downloader-prod"
          cd "${deploy_dir}"

          docker compose \
            -p ig-reel-downloader-prod \
            -f docker-compose.yaml \
            -f docker-compose.prod.override.yaml \
            pull

      - name: Run migrations
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          deploy_dir="${HOME}/deploy/ig-reel-downloader-prod"
          cd "${deploy_dir}"

          docker compose \
            -p ig-reel-downloader-prod \
            -f docker-compose.yaml \
            -f docker-compose.prod.override.yaml \
            run --rm migrate

      - name: Start downloader
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          deploy_dir="${HOME}/deploy/ig-reel-downloader-prod"
          cd "${deploy_dir}"

          docker compose \
            -p ig-reel-downloader-prod \
            -f docker-compose.yaml \
            -f docker-compose.prod.override.yaml \
            up -d --no-deps --remove-orphans downloader

      - name: Show status
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          deploy_dir="${HOME}/deploy/ig-reel-downloader-prod"
          cd "${deploy_dir}"

          docker compose \
            -p ig-reel-downloader-prod \
            -f docker-compose.yaml \
            -f docker-compose.prod.override.yaml \
            ps
