# Test-only override: builds the current checkout and uses disposable local state.
services:
  postgres:
    ports:
      - "127.0.0.1:${PG_TEST_PORT:-55432}:5432"

  postgres-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: ig-reel-downloader-pg-test:local
    pull_policy: never

  postgres-transfer:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: ig-reel-downloader-pg-test:local
    pull_policy: never
    environment:
      DB_MIGRATION_URL: ${DB_MIGRATION_URL}
      OUTPUT_DIR: /app/output
    volumes:
      - ${PG_TEST_DATA_DIR:?set PG_TEST_DATA_DIR}:/app/data:ro
      - ${PG_TEST_OUTPUT_DIR:?set PG_TEST_OUTPUT_DIR}:/app/output:ro

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: ig-reel-downloader-pg-test:local
    pull_policy: never

  downloader:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: ig-reel-downloader-pg-test:local
    pull_policy: never
    entrypoint: ["/app/.venv/bin/python"]
    command: ["scripts/postgres_runtime_probe.py"]
    restart: "no"
